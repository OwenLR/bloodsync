<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | BloodSync</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/features/dashboard.css" />
  <!-- bloodDrives.css linked for .status-badge / .status-badge--* only
       (used on the Upcoming Drives list below). Same "borrow shared base
       classes" pattern already flagged as CSS debt in sessionState.md's
       Not Started section (bloodUnits.html, requests.html do the same) —
       not introducing a new instance of the pattern, just following the
       existing one. -->
  <link rel="stylesheet" href="/assets/css/features/bloodDrives.css" />
  <link rel="stylesheet" href="/assets/css/pages/staff/dashboard.css" />
</head>
<body class="app-loading">

  <nav id="navbar"></nav>

  <div class="page-shell">
    <aside id="sidebar"></aside>

    <main id="content" class="page-content">
      <div class="page-header">
        <h1 class="page-title">Dashboard</h1>
      </div>

      <div id="dashboard-skeleton" class="dashboard-skeleton">
        <div class="skeleton-item">
          <div class="skeleton-line skeleton-line-wide"></div>
          <div class="skeleton-line skeleton-line-narrow"></div>
        </div>
        <div class="skeleton-item">
          <div class="skeleton-line skeleton-line-wide"></div>
          <div class="skeleton-line skeleton-line-narrow"></div>
        </div>
        <div class="skeleton-item">
          <div class="skeleton-line skeleton-line-wide"></div>
          <div class="skeleton-line skeleton-line-narrow"></div>
        </div>
      </div>

      <div id="dashboard-error" class="field-error"></div>

      <div id="dashboard-content" style="display:none;">

        <section id="kpi-row" class="kpi-grid"></section>

        <section class="chart-grid">
          <div class="chart-card">
            <h2 class="chart-card-title">Stock by Blood Type</h2>
            <div class="chart-canvas-wrap">
              <canvas id="chart-stock-by-type"></canvas>
            </div>
          </div>

          <div class="chart-card">
            <h2 class="chart-card-title">Active Request Urgency</h2>
            <div class="chart-canvas-wrap">
              <canvas id="chart-request-urgency"></canvas>
            </div>
          </div>
        </section>

        <section class="chart-card" style="margin-bottom:24px;">
          <h2 class="chart-card-title">Upcoming Drives at Your Branch</h2>
          <div id="upcoming-drives-list" class="drive-list"></div>
        </section>

        <section id="quick-actions" class="quick-actions"></section>

      </div>
    </main>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://unpkg.com/chart.js@4.5.1/dist/chart.umd.js"></script>
  <script type="module" src="/js/entry/staff/dashboard.js"></script>
</body>
</html>
