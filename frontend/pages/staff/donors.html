<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donors | BloodSync</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/features/donors.css" />
  <link rel="stylesheet" href="/assets/css/pages/staff/donors.css" />
</head>
<body class="app-loading">

  <nav id="navbar"></nav>

  <div class="page-shell">
    <aside id="sidebar"></aside>

    <main id="content" class="page-content">

      <div class="page-header">
        <div class="page-header-left">
          <h1 class="page-title">Donors</h1>
          <p class="page-subtitle">Search, view, and manage donor records.</p>
        </div>
      </div>

      <!-- Search -->
      <div class="table-toolbar">
        <input
          id="donor-search"
          type="search"
          class="search-input"
          placeholder="Search by name or ID number…"
          autocomplete="off"
        />
      </div>

      <!-- Donor Table -->
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Blood Type</th>
            </tr>
          </thead>
          <tbody id="donors-table-body"></tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- ── View Modal ─────────────────────────────────────────────────────── -->
  <div id="donor-view-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="view-modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="view-modal-title">Donor Details</h2>
        <button class="modal-close" data-close-modal="donor-view-modal" aria-label="Close">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div id="donor-view-content"></div>
      </div>
      <div class="modal-footer">
        <button id="view-modal-edit-btn" class="btn-primary">Edit Donor</button>
        <button class="btn-secondary" data-close-modal="donor-view-modal">Close</button>
      </div>
    </div>
  </div>

  <!-- ── Edit Modal ─────────────────────────────────────────────────────── -->
  <div id="donor-edit-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="edit-modal-title">Edit Donor</h2>
        <button class="modal-close" data-close-modal="donor-edit-modal" aria-label="Close">&#x2715;</button>
      </div>
      <div class="modal-body">
        <form id="donor-edit-form" novalidate>

          <div class="form-row">
            <div class="form-group">
              <label for="edit-first-name">First Name</label>
              <input id="edit-first-name" type="text" class="form-input" autocomplete="off" />
              <span id="edit-first-name-error" class="field-error" style="display:none"></span>
            </div>
            <div class="form-group">
              <label for="edit-last-name">Last Name</label>
              <input id="edit-last-name" type="text" class="form-input" autocomplete="off" />
              <span id="edit-last-name-error" class="field-error" style="display:none"></span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="edit-birthdate">Birthdate</label>
              <input id="edit-birthdate" type="date" class="form-input" />
              <span id="edit-birthdate-error" class="field-error" style="display:none"></span>
            </div>
            <div class="form-group">
              <label for="edit-sex">Sex</label>
              <select id="edit-sex" class="form-input">
                <option value="">Select…</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
              </select>
              <span id="edit-sex-error" class="field-error" style="display:none"></span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="edit-blood-type">Blood Type</label>
              <select id="edit-blood-type" class="form-input">
                <option value="">Unknown</option>
                <option value="A+">A+</option>
                <option value="A-">A−</option>
                <option value="B+">B+</option>
                <option value="B-">B−</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB−</option>
                <option value="O+">O+</option>
                <option value="O-">O−</option>
              </select>
              <span id="edit-blood-type-error" class="field-error" style="display:none"></span>
            </div>
            <div class="form-group">
              <label for="edit-contact">Contact Number</label>
              <input id="edit-contact" type="tel" class="form-input" placeholder="09171234567" autocomplete="off" />
              <span id="edit-contact-error" class="field-error" style="display:none"></span>
            </div>
          </div>

          <div class="form-group">
            <label for="edit-email">Email</label>
            <input id="edit-email" type="email" class="form-input" autocomplete="off" />
            <span id="edit-email-error" class="field-error" style="display:none"></span>
          </div>

        </form>
      </div>
      <div class="modal-footer modal-footer-spread">
        <!-- Delete button hidden for Staff — donorsUI.js enforces this via role check -->
        <button id="donor-edit-delete-btn" class="btn-danger" style="display:none">Delete Donor</button>
        <div class="modal-footer-actions">
          <button class="btn-secondary" data-close-modal="donor-edit-modal">Cancel</button>
          <button id="donor-edit-submit" class="btn-primary">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/js/entry/staff/donors.js"></script>
</body>
</html>
