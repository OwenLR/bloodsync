<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blood Drives | BloodSync</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/features/bloodDrives.css" />
  <link rel="stylesheet" href="/assets/css/pages/admin/bloodDrives.css" />
</head>
<body class="app-loading">
  <nav id="navbar"></nav>

  <div class="page-shell">
    <aside id="sidebar"></aside>

    <main id="content" class="page-content">

      <div class="page-header">
        <h1>Blood Drives</h1>
        <a id="new-drive-link" href="/pages/staff/bloodDriveCreate.html" class="btn-primary">+ New Drive</a>
      </div>

      <div id="drives-skeleton"></div>
      <div id="drives-error"></div>

      <div id="drives-table-container" style="display:none;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Branch</th>
              <th>Location</th>
              <th>Date Range</th>
              <th>Slots</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="drives-tbody"></tbody>
        </table>
      </div>

    </main>
  </div>

  <div id="panel-overlay" class="panel-overlay"></div>

  <aside id="participant-panel" class="participant-panel" aria-label="Participant Assignment">
    <div class="panel-header">
      <div>
        <h3>Participants</h3>
        <p id="panel-drive-name" class="panel-drive-name"></p>
      </div>
      <button id="panel-close-btn" class="panel-close-btn" aria-label="Close panel">&times;</button>
    </div>

    <div class="panel-body">

      <section>
        <p class="panel-section-title">Assigned</p>
        <div id="current-participants-list"></div>
      </section>

      <section id="panel-add-section">
        <p class="panel-section-title">Add Participants</p>

        <div class="panel-filters">
          <select id="panel-role-filter" aria-label="Filter by role">
            <option value="">All roles</option>
            <option value="5">Volunteer</option>
            <option value="6">Phlebotomist</option>
          </select>
          <input
            id="panel-municipality-filter"
            type="text"
            placeholder="Filter by municipality…"
            aria-label="Filter by municipality"
          />
        </div>

        <div id="available-volunteers-list"></div>

        <div class="panel-assign-bar">
          <button id="panel-assign-selected-btn" class="btn-secondary btn-sm" disabled>
            Assign Selected
          </button>
          <span class="panel-assign-hint">Check volunteers above to select</span>
        </div>

        <div class="panel-assign-divider"><span>or</span></div>

        <div class="panel-assign-bar">
          <label for="panel-assign-count" class="panel-assign-label">Auto-assign nearest</label>
          <input id="panel-assign-count" type="number" min="1" max="100" value="1" />
          <button id="panel-assign-btn" class="btn-primary btn-sm">Auto-assign</button>
        </div>
        <p class="panel-assign-note">Role filter above applies to both actions.</p>

      </section>

    </div>
  </aside>

  <script type="module" src="/js/entry/admin/bloodDrives.js"></script>
</body>
</html>
