<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | BloodSync</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/features/profile.css" />
</head>
<body class="app-loading">
  <nav id="navbar"></nav>
  <div class="page-shell">
    <aside id="sidebar"></aside>
    <main id="content" class="page-content">

      <section class="profile-header">
        <div class="profile-avatar-wrap">
          <img class="profile-avatar-lg hidden" id="profile-avatar" src="" alt="Profile photo" />
          <div class="profile-avatar-placeholder-lg hidden" id="profile-avatar-placeholder"></div>
        </div>
        <div class="profile-header-info">
          <h1 class="profile-name" id="profile-name">—</h1>
          <div class="profile-badges">
            <span class="profile-role-badge" id="profile-role-label">—</span>
          </div>
          <p class="profile-email" id="profile-email">—</p>
        </div>
      </section>

      <section class="profile-card" id="password-card" aria-labelledby="heading-password">
  <div class="profile-card-header">
    <h2 class="profile-card-title" id="heading-password">Password</h2>
    <button type="button" class="card-edit-trigger" data-edit-trigger>
      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      Change
    </button>
  </div>

  <div data-view>
    <div class="profile-info-item">
      <span class="profile-info-label">Current Password</span>
      <span class="profile-info-value profile-password-mask">••••••••••••</span>
    </div>
  </div>

  <div data-edit class="hidden">
    <form id="password-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="current-password">Current Password</label>
        <div class="password-input-wrap">
          <input class="form-input" type="password" id="current-password" name="current_password" autocomplete="current-password" required />
          <button type="button" class="password-toggle-btn" data-toggle-password="current-password" aria-label="Show password">
            <svg class="icon-eye" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="icon-eye-off hidden" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.35 21.35 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.35 21.35 0 0 1-3.22 4.44M14.12 14.12a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/></svg>
          </button>
        </div>
        <span class="field-error field-error-hidden" id="error-current-password" aria-live="polite"></span>
      </div>
      <div class="form-group">
        <label class="form-label" for="new-password">New Password</label>
        <div class="password-input-wrap">
          <input class="form-input" type="password" id="new-password" name="new_password" autocomplete="new-password" required />
          <button type="button" class="password-toggle-btn" data-toggle-password="new-password" aria-label="Show password">
            <svg class="icon-eye" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="icon-eye-off hidden" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.35 21.35 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.35 21.35 0 0 1-3.22 4.44M14.12 14.12a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/></svg>
          </button>
        </div>
        <span class="field-error field-error-hidden" id="error-new-password" aria-live="polite"></span>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm-password">Confirm New Password</label>
        <div class="password-input-wrap">
          <input class="form-input" type="password" id="confirm-password" name="confirm_password" autocomplete="new-password" required />
          <button type="button" class="password-toggle-btn" data-toggle-password="confirm-password" aria-label="Show password">
            <svg class="icon-eye" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="icon-eye-off hidden" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.35 21.35 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.35 21.35 0 0 1-3.22 4.44M14.12 14.12a3 3 0 1 1-4.24-4.24"/><path d="M1 1l22 22"/></svg>
          </button>
        </div>
        <span class="field-error field-error-hidden" id="error-confirm-password" aria-live="polite"></span>
      </div>
      <span class="field-error field-error-hidden profile-form-error" id="error-password-form" aria-live="polite"></span>
      <div class="profile-form-actions">
        <button class="btn-primary" type="submit" id="btn-change-password">Save Password</button>
        <button class="btn-secondary" type="button" data-edit-cancel>Cancel</button>
      </div>
    </form>
  </div>
</section>

    </main>
  </div>

  <script type="module" src="/js/entry/requestor/profile.js"></script>
</body>
</html>
