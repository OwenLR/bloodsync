<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | BloodSync</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/features/dashboard.css" />

</head>
<body class="app-loading">

  <nav id="navbar"></nav>

  <div class="page-shell">
    <aside id="sidebar"></aside>

    <main id="content" class="page-content">

      <!-- No .page-header here on purpose — the hero below serves as
           this page's banner/title, matching the warmer public-facing
           register for Requestor vs. Admin/Staff's plain page-header. -->
      <section id="dashboard-hero" class="dashboard-hero"></section>

      <div class="dashboard-grid">
        <section id="active-request-card" class="chart-card"></section>
        <section id="mission-blurb" class="chart-card"></section>
        <section id="availability-teaser" class="chart-card"></section>
      </div>

      <section id="quick-actions" class="quick-actions"></section>

    </main>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module" src="/js/entry/requestor/dashboard.js"></script>
